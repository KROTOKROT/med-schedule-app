version: '3.8'

services:
  db:
    image: postgres:15
    container_name: medschedule-db
    restart: always
    environment:
      POSTGRES_DB: medschedule
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: medschedule-backend
    restart: always
    depends_on:
      - db
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/medschedule
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: my_super_secret_key_which_must_be_at_least_32_chars_long

volumes:
  db_data: